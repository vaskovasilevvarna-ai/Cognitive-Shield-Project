name: Python Tests

on:
  push:
    branches:
      - active/mvp-foundation
      - main
  pull_request:
    branches:
      - main

jobs:
  python-tests:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}/src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Check Python syntax
        run: |
          python -m compileall src tests

      - name: Run Sprint 1 and Sprint 2 admitted tests
        run: |
          python -m pytest \
            tests/unit/test_input_normalizer.py \
            tests/unit/test_input_validator.py \
            tests/unit/test_input_readiness.py \
            tests/unit/test_input_to_mds_preview.py \
            tests/unit/test_mds_to_cmo_preview.py \
            tests/unit/test_cmo_to_acp_preview.py \
            tests/unit/test_acp_to_analysis_preview.py \
            tests/unit/test_mds_surface_preparation.py
